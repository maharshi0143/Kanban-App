services:
  db:
    image: postgres:16-alpine
    container_name: kanban-db
    environment:
      POSTGRES_DB: kanban
      POSTGRES_USER: kanban
      POSTGRES_PASSWORD: kanban
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./seeds:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban -d kanban"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kanban-app
    environment:
      DATABASE_URL: postgresql://kanban:kanban@db:5432/kanban
      PORT: 3000
      NODE_ENV: production
      SOCKET_INTERNAL_TOKEN: dev-internal-token
      SOCKET_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q ok"]
      interval: 10s
      timeout: 3s
      retries: 18
      start_period: 20s

volumes:
  pg_data:
